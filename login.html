<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>
    <header>
    <div class="nav-bar">
      <div class="logo-bar border">
        <div class="logo"></div>
      </div>
      <div class="nav-adress border">
        <p class="first-add">Deliver to</p>
        <div class="add-icon"></div>
        <p class="second-add">India</p>
      </div>
      <div class="nav-search">
        <select class="search-select">
          <option>All</option>
          <option>Electronics</option>
          <option>Books</option>
          <option>Clothing</option>
          <option>Home & Kitchen</option>
          <option>Sports</option>
          <option>Beauty</option>
        </select>
        <input placeholder="Search Amazon" type="text" />
      </div>
      <div class="nav-sign border">
        <p><span>Hello, sign in</span></p>
        <p class="nav-second">Account & Lists</p>
      </div>
      <div class="nav-return border">
        <p><span>Returns</span></p>
        <p class="nav-second">& Orders</p>
      </div>
      <div class="nav-cart border">
        <a href="cart.html" style="color: white; text-decoration: none;">
          <p><span>🛒</span></p>
          <p>Cart</p>
        </a>
      </div>
    </div>
  </header>

    <main>
        <h1>Login</h1>
        <form class="login-form" action="/login" method="POST">
            <label for="username">Email:</label>
            <input type="email" id="username" name="username" required />

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required />

            <button type="submit">Log In</button>
            <a href="#" class="forgot-password">Forgot password?</a>
        </form>

        <div class="social-login">
            <p>Or login with</p>
            <button class="social-btn google" type="button">Google</button>
            <button class="social-btn facebook" type="button">Facebook</button>
        </div>
    </main>

    <script src="login-check.js"></script>
</body>
</html>
